<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#44475A; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding-top:60px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',sans-serif; font-size:18px; line-height:1.6; color:#F8F8F2; }
#card-wrapper { width:100%; background:#282A36; border-radius:12px; padding:60px 32px 60px 32px; }
h1 { font-size:1.75em; font-weight:600; margin:0 0 16px; padding-bottom:8px; border-bottom:2px solid #6272A4; color:#BD93F9; } h2 { font-size:1.35em; font-weight:600; margin:24px 0 8px; padding-bottom:6px; border-bottom:1px solid #6272A4; color:#FF79C6; } h3 { font-size:1.1em; font-weight:600; margin:20px 0 6px; color:#8BE9FD; }
p { margin:0 0 10px; } strong { color:#FFB86C; font-weight:600; }
a { color:#8BE9FD; }
code { font-family:ui-monospace,monospace; font-size:.85em; padding:2px 6px; background:rgba(98,114,164,.3); border-radius:4px; color:#F1FA8C; }
pre { font-family:ui-monospace,monospace; font-size:.85em; line-height:1.45; background:rgba(98,114,164,.2); border-radius:6px; padding:16px; margin:0 0 16px; white-space:pre-wrap; } pre code { padding:0; background:none; color:inherit; }
blockquote { margin:0 0 16px; padding:8px 16px; border-left:3px solid #50FA7B; background:rgba(80,250,123,.06); border-radius:0 6px 6px 0; color:#F8F8F2; font-style:italic; }
ul,ol { margin:0 0 16px; padding-left:2em; } li { margin-bottom:4px; }
table { border-collapse:collapse; width:100%; margin:0 0 16px; } th,td { border:1px solid #6272A4; padding:6px 13px; } th { background:rgba(98,114,164,.3); font-weight:600; color:#BD93F9; } tr:nth-child(even) td { background:rgba(98,114,164,.1); }
hr { border:none; border-top:1px solid #6272A4; margin:24px 0; }
.content>:first-child { margin-top:0!important; }
</style></head><body><div id="card-wrapper"><div class="content">[CONTENT]</div></div></body></html>
