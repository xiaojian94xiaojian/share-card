<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #eff1f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; }
  /* Catppuccin Latte */
  #card-wrapper { width: 100%; min-height: 300px; background: #eff1f5; position: relative; overflow: hidden; padding: 44px 44px 56px; color: #4c4f69; }
  #card-wrapper::before { content: ''; position: absolute; top: -5%; left: 50%; width: 60%; height: 35%; background: radial-gradient(ellipse, rgba(30,102,245,0.05), transparent 70%); pointer-events: none; }
  .content { position: relative; z-index: 1; }

  /* Headings */
  h1 { font-size: 36px; font-weight: 700; color: #1e66f5; margin: 28px 0 10px; line-height: 1.2; }
  h2 { font-size: 24px; font-weight: 700; color: #8839ef; margin: 24px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #ccd0da; line-height: 1.3; }
  h3 { font-size: 20px; font-weight: 700; color: #fe640b; margin: 20px 0 6px; line-height: 1.3; }
  h4 { font-size: 18px; font-weight: 700; color: #179299; margin: 16px 0 4px; line-height: 1.3; }
  h5, h6 { font-size: 16px; font-weight: 700; color: #4c4f69; margin: 14px 0 4px; line-height: 1.3; }

  /* Paragraph & inline */
  p { font-size: 15px; line-height: 1.7; margin-bottom: 8px; color: #4c4f69; }
  strong { color: #1e66f5; font-weight: 700; }
  em { color: #fe640b; font-style: italic; }
  a { color: #1e66f5; text-decoration: underline; }

  /* Blockquote */
  blockquote { border-left: 3px solid #8839ef; margin: 10px 0; padding: 8px 14px; background: #e6e9ef; border-radius: 0 6px 6px 0; font-size: 14px; color: #5c5f77; line-height: 1.6; font-style: italic; }
  blockquote strong { color: #8839ef; }

  /* Code */
  code { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; background: #ccd0da; color: #d20f39; padding: 1px 5px; border-radius: 4px; }
  pre { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; background: #e6e9ef; border: 1px solid #bcc0cc; border-radius: 8px; padding: 14px 16px; margin: 10px 0; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; word-break: break-word; color: #40a02b; }
  pre code { background: none; color: inherit; padding: 0; border-radius: 0; }

  /* Lists */
  ul, ol { margin: 6px 0 10px 20px; }
  li { font-size: 15px; line-height: 1.7; margin-bottom: 3px; color: #4c4f69; }
  ul li::marker { color: #1e66f5; }
  ol li::marker { color: #fe640b; }

  /* Table */
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  th, td { border: 1px solid #ccd0da; padding: 8px 12px; text-align: left; }
  th { background: #dce0e8; font-weight: 600; color: #4c4f69; }
  td { color: #5c5f77; }
  tr:nth-child(even) td { background: #e6e9ef; }

  /* Horizontal rule */
  hr { border: none; border-top: 2px solid #ccd0da; margin: 18px 0; }

  /* Warning / note box */
  .note { margin: 12px 0; padding: 10px 14px; border-radius: 6px; font-size: 13px; line-height: 1.5; }
  .note.warn { background: rgba(210,15,57,0.06); border-left: 3px solid #d20f39; color: #d20f39; }
  .note.info { background: rgba(30,102,245,0.06); border-left: 3px solid #1e66f5; color: #1e66f5; }

  /* First child shouldn't have big top margin */
  .content > :first-child { margin-top: 0 !important; }

  .watermark { position: absolute; bottom: 16px; right: 28px; font-size: 11px; color: #9ca0b0; z-index: 1; }
  .logo { position: absolute; top: 16px; right: 28px; font-size: 11px; color: #9ca0b0; z-index: 1; }
</style>
</head>
<body>
<div id="card-wrapper">
<div class="content">
<div class="logo">Claude Share</div>
[CONTENT]
</div>
<div class="watermark">Claude Share</div>
</div>
</body>
</html>
