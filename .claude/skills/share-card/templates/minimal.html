<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f6f8fa; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding-top:100px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',sans-serif; font-size:18px; line-height:1.6; color:#1f2328; }
#card-wrapper { width:100%; background:#ffffff; border-radius:12px; padding:100px 32px 100px 32px; border:1px solid #d0d7de; }
h1 { font-size:2em; font-weight:600; margin:0 0 16px; padding-bottom:8px; border-bottom:1px solid #d0d7de; } h2 { font-size:1.5em; font-weight:600; margin:24px 0 8px; padding-bottom:6px; border-bottom:1px solid #d0d7de; } h3 { font-size:1.25em; font-weight:600; margin:24px 0 8px; }
p { margin:0 0 10px; } strong { font-weight:600; } a { color:#0969da; }
code { font-family:ui-monospace,monospace; font-size:.85em; padding:2px 6px; background:rgba(175,184,193,.2); border-radius:6px; }
pre { font-family:ui-monospace,monospace; font-size:.85em; line-height:1.45; background:#f6f8fa; border-radius:6px; padding:16px; margin:0 0 16px; white-space:pre-wrap; } pre code { padding:0; background:none; }
blockquote { margin:0 0 16px; padding:0 16px; border-left:4px solid #d0d7de; color:#656d76; }
ul,ol { margin:0 0 16px; padding-left:2em; } li { margin-bottom:4px; }
table { border-collapse:collapse; width:100%; margin:0 0 16px; } th,td { border:1px solid #d0d7de; padding:6px 13px; } th { background:#f6f8fa; font-weight:600; } tr:nth-child(even) td { background:#f6f8fa; }
hr { border:none; border-top:1px solid #d0d7de; margin:24px 0; }
.content>:first-child { margin-top:0!important; }
</style></head><body><div id="card-wrapper"><div class="content">[CONTENT]</div></div></body></html>
