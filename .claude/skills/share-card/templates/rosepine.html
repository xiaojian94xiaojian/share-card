<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#faf4ed; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding-top:100px; font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; font-size:18px; line-height:1.8; color:#575279; }
/* Rosé Pine Dawn */
#card-wrapper { width:100%; background:#fffaf3; border-radius:16px; padding:100px 32px 100px 32px; border:1px solid #f2e9e1; }
h1 { font-size:1.8em; font-weight:700; color:#d7827e; margin-bottom:6px; }
h2 { font-size:1.3em; font-weight:600; color:#907aa9; margin:24px 0 8px; padding-bottom:4px; border-bottom:1px solid #f2e9e1; }
h3 { font-size:1.1em; font-weight:600; color:#907aa9; margin:16px 0 6px; }
p { margin:0 0 10px; }
strong { color:#ea9d34; }
a { color:#d7827e; }
code { font-family:ui-monospace,monospace; font-size:.9em; padding:2px 6px; background:#f2e9e1; border-radius:4px; color:#575279; }
pre { font-family:ui-monospace,monospace; font-size:.85em; line-height:1.5; background:#faf4ed; border-radius:6px; padding:14px; margin:0 0 14px; white-space:pre-wrap; } pre code { padding:0; background:none; }
blockquote { border-left:3px solid #b4637a; margin:10px 0; padding:8px 14px; background:rgba(180,99,122,.06); border-radius:0 8px 8px 0; color:#b4637a; font-style:italic; }
ul,ol { margin:6px 0 14px 20px; } li { margin-bottom:3px; }
table { width:100%; border-collapse:collapse; margin:10px 0; } th,td { border:1px solid #f2e9e1; padding:6px 12px; } th { background:#faf4ed; font-weight:600; color:#575279; } tr:nth-child(even) td { background:rgba(250,244,237,.5); }
hr { border:none; border-top:1px solid #f2e9e1; margin:18px 0; }
.content>:first-child { margin-top:0!important; }
</style></head><body><div id="card-wrapper"><div class="content">[CONTENT]</div></div></body></html>
