<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
  }
  /* Catppuccin Mocha */
  #card-wrapper {
    width: 100%; min-height: 400px;
    background: #1e1e2e;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 48px 52px;
    color: #cdd6f4;
  }
  #card-wrapper::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 30% 0%, rgba(137,180,250,0.05), transparent 60%);
    pointer-events: none;
  }
  .title-bar {
    z-index: 1; display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.red    { background: #f38ba8; }
  .dot.yellow { background: #f9e2af; }
  .dot.green  { background: #a6e3a1; }
  .filename {
    font-size: 15px; color: #a6adc8;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  .code-area {
    z-index: 1;
    background: #181825; border: 1px solid #45475a;
    border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 200px; margin-bottom: 24px;
  }
  .code-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 18px; background: #11111b;
    border-bottom: 1px solid #45475a;
  }
  .lang-label {
    font-size: 12px; color: #89b4fa; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .line-count { font-size: 12px; color: #585b70; }
  .code-body {
    flex: 1; padding: 18px; overflow: hidden;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 17px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
    color: #cdd6f4;
  }
  .explanation {
    z-index: 1; font-size: 17px; color: #a6adc8;
    line-height: 1.6; text-align: center;
  }
  .footer {
    position: absolute; bottom: 20px; right: 34px;
    font-size: 12px; color: #585b70; z-index: 1;
  }
</style>
</head>
<body>
  <div id="card-wrapper">
    <div class="title-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="filename">[FILENAME]</span>
    </div>
    <div class="code-area">
      <div class="code-header">
        <span class="lang-label">[LANGUAGE]</span>
        <span class="line-count">[LINE_COUNT]</span>
      </div>
      <div class="code-body">[CODE]</div>
    </div>
    <div class="explanation">[EXPLANATION]</div>
    <div class="footer">Claude Share</div>
  </div>
</body>
</html>
