<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#343F44; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',sans-serif; font-size:16px; line-height:1.6; color:#D3C6AA; }
#card-wrapper { width:100%; background:#2D353B; border-radius:12px; padding:36px 32px; }
h1 { font-size:1.75em; font-weight:600; margin:0 0 16px; padding-bottom:8px; border-bottom:2px solid #475258; color:#A7C080; } h2 { font-size:1.35em; font-weight:600; margin:24px 0 8px; padding-bottom:6px; border-bottom:1px solid #475258; color:#83C092; } h3 { font-size:1.1em; font-weight:600; margin:20px 0 6px; color:#DBBC7F; }
p { margin:0 0 10px; } strong { color:#D3C6AA; font-weight:600; }
a { color:#7FBBB3; }
code { font-family:ui-monospace,monospace; font-size:.85em; padding:2px 6px; background:#475258; border-radius:4px; color:#E69875; }
pre { font-family:ui-monospace,monospace; font-size:.85em; line-height:1.45; background:#3D484D; border-radius:6px; padding:16px; margin:0 0 16px; white-space:pre-wrap; } pre code { padding:0; background:none; color:inherit; }
blockquote { margin:0 0 16px; padding:8px 16px; border-left:3px solid #7FBBB3; background:rgba(127,187,179,.1); border-radius:0 6px 6px 0; color:#D3C6AA; font-style:italic; }
ul,ol { margin:0 0 16px; padding-left:2em; } li { margin-bottom:4px; }
table { border-collapse:collapse; width:100%; margin:0 0 16px; } th,td { border:1px solid #475258; padding:6px 13px; } th { background:#3D484D; font-weight:600; color:#83C092; } tr:nth-child(even) td { background:rgba(61,72,77,.3); }
hr { border:none; border-top:1px solid #475258; margin:24px 0; }
.content>:first-child { margin-top:0!important; }
</style></head><body><div id="card-wrapper"><div class="content">[CONTENT]</div></div></body></html>
