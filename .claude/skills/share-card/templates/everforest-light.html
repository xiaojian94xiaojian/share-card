<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#efebd4; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding-top:60px; font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; font-size:18px; line-height:1.8; color:#5c6a61; }
/* Everforest Light */
#card-wrapper { width:100%; background:#fdf6e3; border-radius:16px; padding:60px 32px 60px 32px; border:1px solid #e0dcc7; }
h1 { font-size:1.8em; font-weight:700; color:#8da101; margin-bottom:6px; }
h2 { font-size:1.3em; font-weight:600; color:#5c6a61; margin:24px 0 8px; padding-bottom:4px; border-bottom:1px solid #e0dcc7; }
h3 { font-size:1.1em; font-weight:600; color:#f57d26; margin:16px 0 6px; }
p { margin:0 0 10px; }
strong { color:#f57d26; }
a { color:#8da101; }
code { font-family:ui-monospace,monospace; font-size:.9em; padding:2px 6px; background:#e0dcc7; border-radius:4px; color:#5c6a61; }
pre { font-family:ui-monospace,monospace; font-size:.85em; line-height:1.5; background:#efebd4; border-radius:6px; padding:14px; margin:0 0 14px; white-space:pre-wrap; } pre code { padding:0; background:none; }
blockquote { border-left:3px solid #8da101; margin:10px 0; padding:8px 14px; background:rgba(141,161,1,.06); border-radius:0 8px 8px 0; color:#8da101; font-style:italic; }
ul,ol { margin:6px 0 14px 20px; } li { margin-bottom:3px; }
table { width:100%; border-collapse:collapse; margin:10px 0; } th,td { border:1px solid #e0dcc7; padding:6px 12px; } th { background:#efebd4; font-weight:600; color:#5c6a61; } tr:nth-child(even) td { background:rgba(239,235,212,.5); }
hr { border:none; border-top:1px solid #e0dcc7; margin:18px 0; }
.content>:first-child { margin-top:0!important; }
</style></head><body><div id="card-wrapper"><div class="content">[CONTENT]</div></div></body></html>
