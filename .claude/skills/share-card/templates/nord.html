<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2E3440; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif; font-size: 16px; line-height: 1.6; color: #D8DEE9; }
  #card-wrapper { width: 100%; min-height: 300px; background: #2E3440; position: relative; overflow: hidden; padding: 40px 44px 60px; }
  h1 { font-size: 1.75em; font-weight: 600; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 2px solid #4C566A; color: #88C0D0; }
  h2 { font-size: 1.35em; font-weight: 600; margin: 24px 0 8px; padding-bottom: 6px; border-bottom: 1px solid #4C566A; color: #81A1C1; }
  h3 { font-size: 1.1em; font-weight: 600; margin: 20px 0 6px; color: #D8DEE9; }
  p { margin: 0 0 10px; }
  strong { color: #ECEFF4; font-weight: 600; }
  a { color: #5E81AC; }
  code { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.85em; padding: 2px 6px; background: #3B4252; border-radius: 4px; color: #EBCB8B; }
  pre { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.85em; line-height: 1.45; background: #3B4252; border-radius: 6px; padding: 16px; margin: 0 0 16px; white-space: pre-wrap; word-break: break-word; }
  pre code { padding: 0; background: none; color: inherit; }
  blockquote { margin: 0 0 16px; padding: 8px 16px; border-left: 3px solid #5E81AC; background: #3B4252; border-radius: 0 6px 6px 0; color: #E5E9F0; font-style: italic; }
  ul, ol { margin: 0 0 16px; padding-left: 2em; }
  li { margin-bottom: 4px; }
  table { border-collapse: collapse; width: 100%; margin: 0 0 16px; }
  th, td { border: 1px solid #4C566A; padding: 6px 13px; text-align: left; }
  th { font-weight: 600; background: #3B4252; color: #88C0D0; }
  tr:nth-child(even) td { background: rgba(59,66,82,0.4); }
  hr { border: none; border-top: 1px solid #4C566A; margin: 24px 0; }
  .content > :first-child { margin-top: 0 !important; }
</style>
</head>
<body>
<div id="card-wrapper">
<div class="content">
[CONTENT]
</div>
</div>
</body>
</html>
