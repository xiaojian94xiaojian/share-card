<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #303446;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
  }
  /* Catppuccin Frappé */
  #card-wrapper {
    width: 100%; min-height: 400px;
    background: #303446;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 48px 56px;
    color: #c6d0f5;
  }
  #card-wrapper::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(140,170,238,0.08), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(202,158,230,0.08), transparent 50%);
    pointer-events: none;
  }
  .header { z-index: 1; margin-bottom: 32px; }
  .title {
    font-size: 32px; font-weight: 700; color: #8caaee;
  }
  .timestamp {
    font-size: 14px; color: #737994; margin-top: 4px;
  }
  .messages {
    z-index: 1; display: flex; flex-direction: column;
    gap: 18px;
  }
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-label {
    font-size: 12px; font-weight: 600; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .msg.user .msg-label { color: #8caaee; text-align: right; }
  .msg.assistant .msg-label { color: #a6d189; }
  .msg-bubble {
    padding: 16px 22px; border-radius: 18px;
    font-size: 17px; line-height: 1.6;
  }
  .msg.user .msg-bubble {
    background: rgba(140,170,238,0.15);
    border: 1px solid rgba(140,170,238,0.3);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: rgba(166,209,137,0.12);
    border: 1px solid rgba(166,209,137,0.25);
    border-bottom-left-radius: 4px;
  }
  .footer {
    position: absolute; bottom: 24px; right: 44px;
    font-size: 12px; color: #737994; z-index: 1;
  }
</style>
</head>
<body>
  <div id="card-wrapper">
    <div class="header">
      <div class="title">[TITLE]</div>
      <div class="timestamp">[TIMESTAMP]</div>
    </div>
    <div class="messages">
      [MESSAGES]
    </div>
    <div class="footer">Claude Share</div>
  </div>
</body>
</html>
