<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1e1e2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
  }
  /* Catppuccin Mocha */
  #card-wrapper {
    width: 100%; min-height: 400px;
    background: #1e1e2e;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 64px 70px;
    color: #cdd6f4;
  }
  #card-wrapper::before {
    content: '';
    position: absolute; top: -25%; right: -15%; width: 65%; height: 75%;
    background: radial-gradient(ellipse, rgba(203,166,247,0.1), transparent 70%);
    pointer-events: none;
  }
  #card-wrapper::after {
    content: '';
    position: absolute; bottom: -15%; left: -8%; width: 55%; height: 65%;
    background: radial-gradient(ellipse, rgba(137,180,250,0.06), transparent 70%);
    pointer-events: none;
  }
  .headline {
    font-size: 56px; font-weight: 800; z-index: 1;
    line-height: 1.15; margin-bottom: 24px;
    background: linear-gradient(135deg, #cdd6f4 0%, #89b4fa 50%, #cba6f7 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .quote-mark {
    font-size: 100px; line-height: 1;
    background: linear-gradient(135deg, #89b4fa, #cba6f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    z-index: 1;
  }
  .quote {
    font-size: 26px; color: #bac2de; z-index: 1;
    line-height: 1.6; max-width: 640px;
    font-style: italic; margin-bottom: 36px;
  }
  .attribution { z-index: 1; display: flex; align-items: center; gap: 14px; }
  .author { font-size: 20px; font-weight: 600; color: #cdd6f4; }
  .context { font-size: 15px; color: #a6adc8; }
  .watermark {
    position: absolute; bottom: 28px; right: 40px;
    font-size: 13px; color: #585b70; z-index: 1;
  }
</style>
</head>
<body>
  <div id="card-wrapper">
    <div class="headline">[HEADLINE]</div>
    <div class="quote-mark">"</div>
    <div class="quote">[QUOTE]</div>
    <div class="attribution">
      <span class="author">[AUTHOR]</span>
      <span class="context">[CONTEXT]</span>
    </div>
    <div class="watermark">Claude Share</div>
  </div>
</body>
</html>
